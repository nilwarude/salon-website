<svg xmlns="http://www.w3.org/2000/svg" width="600" height="750" viewBox="0 0 600 750">
  <rect width="600" height="750" fill="#1A1A1A"/>
  <rect x="30" y="30" width="540" height="690" rx="5" fill="none" stroke="#C8A96A" stroke-width="1" opacity="0.3"/>
  <!-- Scissors icon -->
  <g transform="translate(200, 200)" opacity="0.15">
    <circle cx="50" cy="150" r="50" fill="none" stroke="#C8A96A" stroke-width="2"/>
    <path d="M50,150 L100,50" stroke="#C8A96A" stroke-width="3"/>
    <circle cx="150" cy="50" r="20" fill="none" stroke="#C8A96A" stroke-width="2"/>
    <path d="M50,150 L100,220" stroke="#C8A96A" stroke-width="3"/>
    <circle cx="150" cy="220" r="20" fill="none" stroke="#C8A96A" stroke-width="2"/>
  </g>
  <!-- Comb -->
  <g transform="translate(350, 400)" opacity="0.12">
    <rect x="0" y="0" width="120" height="200" rx="10" fill="none" stroke="#C8A96A" stroke-width="2"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="#C8A96A" stroke-width="1"/>
    <line x1="0" y1="80" x2="120" y2="80" stroke="#C8A96A" stroke-width="1"/>
    <line x1="0" y1="120" x2="120" y2="120" stroke="#C8A96A" stroke-width="1"/>
    <line x1="0" y1="160" x2="120" y2="160" stroke="#C8A96A" stroke-width="1"/>
  </g>
  <text x="300" y="650" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#C8A96A">Our Story</text>
</svg>