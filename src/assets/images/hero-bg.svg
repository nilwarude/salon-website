<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  <!-- Decorative circles -->
  <circle cx="300" cy="200" r="400" fill="#C8A96A" opacity="0.03"/>
  <circle cx="1600" cy="800" r="350" fill="#C8A96A" opacity="0.03"/>
  <circle cx="1000" cy="500" r="200" fill="#C8A96A" opacity="0.02"/>
  <!-- Salon chair silhouette -->
  <g transform="translate(1150, 250)" opacity="0.08">
    <rect x="0" y="0" width="80" height="200" rx="10" fill="#C8A96A"/>
    <rect x="-20" y="-30" width="120" height="60" rx="30" fill="#C8A96A"/>
    <rect x="80" y="50" width="60" height="15" rx="5" fill="#C8A96A"/>
    <rect x="80" y="100" width="60" height="15" rx="5" fill="#C8A96A"/>
    <rect x="-60" y="50" width="60" height="15" rx="5" fill="#C8A96A"/>
    <rect x="-60" y="100" width="60" height="15" rx="5" fill="#C8A96A"/>
    <circle cx="60" cy="-60" r="40" fill="#C8A96A"/>
  </g>
  <!-- Hair icon decorative -->
  <g transform="translate(200, 700)" opacity="0.06">
    <path d="M0,0 C50,-100 150,-120 200,-50 C250,20 200,100 150,120 C100,140 50,100 30,60" fill="none" stroke="#C8A96A" stroke-width="3"/>
    <path d="M30,0 C80,-80 170,-100 220,-30 C270,40 220,120 170,140" fill="none" stroke="#C8A96A" stroke-width="2"/>
  </g>
  <!-- Text overlay area -->
  <rect x="100" y="350" width="700" height="40" rx="20" fill="#C8A96A" opacity="0.15"/>
  <rect x="100" y="410" width="500" height="20" rx="10" fill="#C8A96A" opacity="0.1"/>
</svg>